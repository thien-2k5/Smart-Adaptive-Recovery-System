spring:
  application:
    name: sars
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:sars_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none # We use init.sql / schema.sql for schema generation
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        
server:
  port: 8080

sars:
  simulation:
    enabled: true
    interval-ms: 30000
    delay-threshold-minutes: 1 # Configurable threshold for demo purposes
